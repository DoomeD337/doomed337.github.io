<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Doomed Design Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<script src="script.js"></script>
<body>
  <main class="app"></main>

<h1>🎨 Design Eye Trainer</h1>
<p>Выбери лучший вариант дизайна</p>

<div class="game">
  <div class="card" onclick="checkAnswer(1)">
    <h3>Вариант A</h3>
    <div class="box bad">
      <p>Текст слишком мелкий</p>
    </div>
  </div>

  <div class="card" onclick="checkAnswer(2)">
    <h3>Вариант B</h3>
    <div class="box good">
      <p>Хороший контраст и отступы</p>
    </div>
  </div>
</div>

<p id="result"></p>
<p>Счёт: <span id="score">0</span></p>

<script src="script.js"></script>
</body>
</html>
