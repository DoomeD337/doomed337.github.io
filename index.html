<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Doomed Design Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>🎨 Design Eye Trainer</h1>
      <p>Выбери лучший вариант интерфейса</p>
    </section>

    <section class="game">
      <div class="card" onclick="checkAnswer(1)">
        <h3>Вариант A</h3>
        <div class="ui-preview" id="previewA"></div>
      </div>

      <div class="card" onclick="checkAnswer(2)">
        <h3>Вариант B</h3>
        <div class="ui-preview" id="previewB"></div>
      </div>
    </section>

    <section class="status">
      <p id="result"></p>
      <p>Счёт: <span id="score">0</span></p>
      <p>⏱ Время: <span id="time">10</span></p>
      <p>🏆 Рекорд: <span id="best">0</span></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
